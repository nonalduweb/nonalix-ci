name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Repository to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/root/nonalix-ci"
          rm: false # Do not delete files on the target directory before copy (preserves .env)
          strip_components: 0
          # Exclude files that don't need to be sent or should not overwrite server files
          exclude: ".git,.github,node_modules,frontend/node_modules,backend/venv,.next,venv,__pycache__,.env,.env.local,*.zip"

      - name: Execute Deploy Script on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/nonalix-ci
            chmod +x deploy.sh
            ./deploy.sh
