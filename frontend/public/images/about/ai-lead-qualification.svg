  <text x="712" y="72" fill="#10B981" font-family="Arial, sans-serif" font-size="11">LIVE</text>

  <!-- ── BIG SCORE CIRCLE ── -->
  <!-- Background circle -->
  <circle cx="457" cy="185" r="72" fill="#1A1D2E" stroke="#2D3148" stroke-width="2"/>
  <!-- Score arc (approx 94%) - using path for arc -->
  <circle cx="457" cy="185" r="62" fill="none" stroke="#1E2847" stroke-width="12"/>
  <circle cx="457" cy="185" r="62" fill="none" stroke="#2563EB" stroke-width="12" stroke-linecap="round"
          stroke-dasharray="367 30" stroke-dashoffset="97" transform="rotate(-90 457 185)"/>
  <!-- Score text -->
  <text x="457" y="178" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="36" font-weight="bold">94</text>
  <text x="457" y="196" text-anchor="middle" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="13">/100</text>
  <!-- HOT LEAD badge -->
  <rect x="417" y="208" width="80" height="20" rx="10" fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
  <text x="457" y="222" text-anchor="middle" fill="#10B981" font-family="Arial, sans-serif" font-size="10" font-weight="700">🔥 HOT LEAD</text>

  <!-- Lead Info -->
  <text x="570" y="135" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Prospect</text>
  <text x="570" y="150" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="600">Kouadio Entreprises</text>
  <text x="570" y="166" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Commerce · Abidjan</text>
  <text x="570" y="186" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Budget</text>
  <text x="570" y="201" fill="#10B981" font-family="Arial, sans-serif" font-size="12" font-weight="600">500K–1M FCFA/mois</text>
  <text x="570" y="221" fill="#6B7280" font-family="Arial, sans-serif" font-size="10">Timing</text>
  <text x="570" y="236" fill="#F59E0B" font-family="Arial, sans-serif" font-size="12" font-weight="600">⚡ Immédiat</text>

  <!-- ── CRITERIA BARS ── -->
  <text x="342" y="290" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1">CRITÈRES BANT</text>

  <!-- Budget -->
  <text x="342" y="312" fill="white" font-family="Arial, sans-serif" font-size="12">Budget</text>
  <text x="726" y="312" text-anchor="end" fill="#10B981" font-family="Arial, sans-serif" font-size="12" font-weight="600">88%</text>
  <rect x="342" y="318" width="380" height="8" rx="4" fill="#1E2336"/>
  <rect x="342" y="318" width="335" height="8" rx="4" fill="url(#score-high)"/>

  <!-- Authority -->
  <text x="342" y="344" fill="white" font-family="Arial, sans-serif" font-size="12">Autorité (décideur)</text>
  <text x="726" y="344" text-anchor="end" fill="#10B981" font-family="Arial, sans-serif" font-size="12" font-weight="600">92%</text>
  <rect x="342" y="350" width="380" height="8" rx="4" fill="#1E2336"/>
  <rect x="342" y="350" width="350" height="8" rx="4" fill="url(#score-high)"/>

  <!-- Need -->
  <text x="342" y="376" fill="white" font-family="Arial, sans-serif" font-size="12">Besoin identifié</text>
  <text x="726" y="376" text-anchor="end" fill="#10B981" font-family="Arial, sans-serif" font-size="12" font-weight="600">96%</text>
  <rect x="342" y="382" width="380" height="8" rx="4" fill="#1E2336"/>
  <rect x="342" y="382" width="365" height="8" rx="4" fill="url(#score-high)"/>

  <!-- Timing -->
  <text x="342" y="408" fill="white" font-family="Arial, sans-serif" font-size="12">Timing (urgence)</text>
  <text x="726" y="408" text-anchor="end" fill="#10B981" font-family="Arial, sans-serif" font-size="12" font-weight="600">100%</text>
  <rect x="342" y="414" width="380" height="8" rx="4" fill="#1E2336"/>
  <rect x="342" y="414" width="380" height="8" rx="4" fill="url(#score-high)"/>

  <!-- ── AUTOMATED ACTIONS ── -->
  <rect x="342" y="438" width="402" height="52" rx="8" fill="#0D1F12" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="358" y="456" fill="#10B981" font-family="Arial, sans-serif" font-size="10" font-weight="700">ACTIONS AUTOMATIQUES DÉCLENCHÉES</text>
  <!-- Action 1 -->
  <circle cx="360" cy="469" r="4" fill="#10B981"/>
  <text x="370" y="473" fill="#D1FAE5" font-family="Arial, sans-serif" font-size="10">Fiche créée dans HubSpot CRM</text>
  <!-- Action 2 -->
  <circle cx="510" cy="469" r="4" fill="#10B981"/>
  <text x="520" y="473" fill="#D1FAE5" font-family="Arial, sans-serif" font-size="10">WhatsApp relance → 30 min</text>
  <!-- Action 3 -->
  <circle cx="360" cy="484" r="4" fill="#2563EB"/>
  <text x="370" y="488" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="10">Email personnalisé envoyé</text>
  <!-- Action 4 -->
  <circle cx="510" cy="484" r="4" fill="#2563EB"/>
  <text x="520" y="488" fill="#BFDBFE" font-family="Arial, sans-serif" font-size="10">Commercial notifié</text>
</svg>
