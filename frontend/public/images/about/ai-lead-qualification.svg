  <!-- Panel header -->
  <rect x="322" y="52" width="422" height="50" rx="10" fill="#1A1D2E"/>
  <rect x="322" y="82" width="422" height="20" fill="#1A1D2E"/>
  <text x="342" y="72" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="700">Lead Intelligence Score</text>
