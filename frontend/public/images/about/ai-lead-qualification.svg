<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0F18"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="score-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="score-high" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="panel-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="left-clip"><rect x="16" y="52" width="290" height="452" rx="10"/></clipPath>
    <clipPath id="right-clip"><rect x="322" y="52" width="422" height="452" rx="10"/></clipPath>
  </defs>

  <!-- Global background -->
  <rect width="760" height="520" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="#1E2130"/>
  </pattern>
  <rect width="760" height="520" fill="url(#dots)"/>

  <!-- TOP BAR -->
  <rect x="0" y="0" width="760" height="44" fill="#080A12"/>
  <!-- Logo / name -->
  <rect x="16" y="12" width="54" height="20" rx="4" fill="#2563EB"/>
  <text x="43" y="26" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">NONALIX</text>
  <text x="82" y="26" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="12">AI Platform</text>
  <text x="200" y="26" fill="#6B7280" font-family="Arial, sans-serif" font-size="12">›</text>
  <text x="215" y="26" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="500">Lead Intelligence</text>
  <!-- Status -->
  <circle cx="698" cy="22" r="5" fill="#10B981"/>
  <text x="710" y="26" fill="#10B981" font-family="Arial, sans-serif" font-size="11" font-weight="600">Actif</text>

  <!-- ════════════════════════════════════════
       LEFT PANEL — Chat Qualification
       ════════════════════════════════════════ -->
  <rect x="16" y="52" width="290" height="452" rx="10" fill="#13151F" filter="url(#panel-shadow)"/>

  <!-- Chat header -->
  <rect x="16" y="52" width="290" height="50" rx="10" fill="#1A1D2E"/>
  <rect x="16" y="82" width="290" height="20" fill="#1A1D2E"/>
  <!-- Avatar -->
  <circle cx="44" cy="77" r="14" fill="#2563EB"/>
  <text x="44" y="82" text-anchor="middle" fill="white" font-family="monospace" font-size="11" font-weight="bold">AI</text>
  <text x="64" y="72" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="600">Agent Qualification</text>
  <circle cx="66" cy="83" r="4" fill="#10B981"/>
  <text x="76" y="87" fill="#10B981" font-family="Arial, sans-serif" font-size="10">En ligne</text>
  <!-- Channels icon -->
  <text x="282" y="80" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="10">WhatsApp · Web</text>

  <!-- Chat messages -->
  <!-- BOT: Question 1 -->
  <rect x="28" y="116" width="196" height="42" rx="7" fill="#1E2336"/>
  <rect x="28" y="116" width="3" height="42" rx="1" fill="#2563EB"/>
  <text x="38" y="132" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="9" font-weight="600">AGENT IA</text>
  <text x="38" y="147" fill="white" font-family="Arial, sans-serif" font-size="11">Bonjour ! Quel est votre</text>
  <text x="38" y="161" fill="white" font-family="Arial, sans-serif" font-size="11">secteur d'activité ?</text>
  <text x="220" y="152" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="9">14:02</text>

  <!-- USER: Reply 1 -->
  <rect x="94" y="170" width="196" height="30" rx="7" fill="#1F3A5F"/>
  <text x="108" y="189" fill="white" font-family="Arial, sans-serif" font-size="11">Commerce de détail 🛍️</text>
  <text x="284" y="193" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="9">14:03 ✓✓</text>

  <!-- BOT: Question 2 -->
  <rect x="28" y="212" width="210" height="42" rx="7" fill="#1E2336"/>
  <rect x="28" y="212" width="3" height="42" rx="1" fill="#2563EB"/>
  <text x="38" y="228" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="9" font-weight="600">AGENT IA</text>
  <text x="38" y="243" fill="white" font-family="Arial, sans-serif" font-size="11">Votre budget mensuel pour</text>
  <text x="38" y="257" fill="white" font-family="Arial, sans-serif" font-size="11">le digital ? (FCFA)</text>
  <text x="234" y="248" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="9">14:03</text>

  <!-- USER: Reply 2 -->
  <rect x="80" y="266" width="210" height="30" rx="7" fill="#1F3A5F"/>
  <text x="94" y="285" fill="white" font-family="Arial, sans-serif" font-size="11">Entre 500K et 1M FCFA/mois</text>
  <text x="284" y="289" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="9">14:04 ✓✓</text>

  <!-- BOT: Question 3 -->
  <rect x="28" y="308" width="200" height="42" rx="7" fill="#1E2336"/>
  <rect x="28" y="308" width="3" height="42" rx="1" fill="#2563EB"/>
  <text x="38" y="324" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="9" font-weight="600">AGENT IA</text>
  <text x="38" y="339" fill="white" font-family="Arial, sans-serif" font-size="11">Quand souhaitez-vous</text>
  <text x="38" y="353" fill="white" font-family="Arial, sans-serif" font-size="11">démarrer le projet ?</text>
  <text x="224" y="344" text-anchor="end" fill="#4B5563" font-family="Arial, sans-serif" font-size="9">14:04</text>

  <!-- USER: Reply 3 -->
  <rect x="116" y="362" width="174" height="30" rx="7" fill="#1F3A5F"/>
  <text x="130" y="381" fill="white" font-family="Arial, sans-serif" font-size="11">Ce mois-ci — urgent ! 🚀</text>
  <text x="284" y="385" text-anchor="end" fill="rgba(255,255,255,0.4)" font-family="Arial, sans-serif" font-size="9">14:05 ✓✓</text>

  <!-- BOT: Scoring in progress -->
  <rect x="28" y="404" width="224" height="52" rx="7" fill="#1A2744"/>
  <rect x="28" y="404" width="3" height="52" rx="1" fill="#10B981"/>
  <text x="38" y="420" fill="#10B981" font-family="Arial, sans-serif" font-size="9" font-weight="600">AGENT IA — ANALYSE</text>
  <text x="38" y="436" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="500">Lead qualifié détecté !</text>
  <text x="38" y="450" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="10">Transfert CRM en cours...</text>
  <!-- Animated dots indicator -->
  <circle cx="44" cy="465" r="3" fill="#2563EB" opacity="0.9"/>
  <circle cx="54" cy="465" r="3" fill="#2563EB" opacity="0.6"/>
  <circle cx="64" cy="465" r="3" fill="#2563EB" opacity="0.3"/>

  <!-- ════════════════════════════════════════
       RIGHT PANEL — Lead Scoring Dashboard
       ════════════════════════════════════════ -->
