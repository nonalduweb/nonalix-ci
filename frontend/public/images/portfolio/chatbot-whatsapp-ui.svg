<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <clipPath id="sidebar-clip"><rect x="0" y="0" width="270" height="500"/></clipPath>
    <clipPath id="main-clip"><rect x="270" y="0" width="530" height="500"/></clipPath>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Full background -->
  <rect width="800" height="500" fill="#111B21"/>

  <!-- ── LEFT SIDEBAR ── -->
  <g clip-path="url(#sidebar-clip)">
    <!-- Sidebar bg -->
    <rect x="0" y="0" width="270" height="500" fill="#111B21"/>

    <!-- Sidebar header -->
    <rect x="0" y="0" width="270" height="58" fill="#202C33"/>
    <!-- Profile avatar -->
    <circle cx="30" cy="29" r="18" fill="#00A884"/>
    <text x="30" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">N</text>
    <!-- Sidebar title -->
    <text x="60" y="33" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">NONALIX Bot</text>

    <!-- Search bar -->
    <rect x="8" y="62" width="254" height="34" rx="17" fill="#202C33"/>
    <text x="42" y="83" fill="#8696A0" font-family="Arial, sans-serif" font-size="12">Rechercher ou démarrer...</text>
    <!-- Search icon -->
    <circle cx="26" cy="79" r="6" fill="none" stroke="#8696A0" stroke-width="1.5"/>
    <line x1="31" y1="84" x2="34" y2="87" stroke="#8696A0" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ── Chat items ── -->

    <!-- Chat 1 active -->
    <rect x="0" y="100" width="270" height="68" fill="#2A3942"/>
    <circle cx="34" cy="134" r="20" fill="#1565C0"/>
    <text x="34" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13">R</text>
    <text x="62" y="124" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="500">Restaurant Maquis</text>
    <text x="62" y="142" fill="#00A884" font-family="Arial, sans-serif" font-size="11">Je suis dans la restauration 🍽️</text>
    <text x="256" y="120" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">14:24</text>
    <circle cx="250" cy="142" r="9" fill="#00A884"/>
    <text x="250" y="146" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">3</text>

    <!-- Divider -->
    <line x1="60" y1="168" x2="270" y2="168" stroke="#2A3942" stroke-width="1"/>

    <!-- Chat 2 -->
    <rect x="0" y="168" width="270" height="68" fill="none"/>
    <circle cx="34" cy="202" r="20" fill="#7B1FA2"/>
    <text x="34" y="208" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13">A</text>
    <text x="62" y="192" fill="white" font-family="Arial, sans-serif" font-size="13">Agence Mode Abidjan</text>
    <text x="62" y="210" fill="#8696A0" font-family="Arial, sans-serif" font-size="11">Merci pour votre aide ! 👏</text>
    <text x="256" y="188" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">13:12</text>

    <!-- Divider -->
    <line x1="60" y1="236" x2="270" y2="236" stroke="#2A3942" stroke-width="1"/>

    <!-- Chat 3 -->
    <rect x="0" y="236" width="270" height="68" fill="none"/>
    <circle cx="34" cy="270" r="20" fill="#00695C"/>
    <text x="34" y="276" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13">C</text>
    <text x="62" y="260" fill="white" font-family="Arial, sans-serif" font-size="13">Clinique Santé+</text>
    <text x="62" y="278" fill="#8696A0" font-family="Arial, sans-serif" font-size="11">Rendez-vous confirmé pour lundi</text>
    <text x="256" y="256" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">Hier</text>

    <!-- Divider -->
    <line x1="60" y1="304" x2="270" y2="304" stroke="#2A3942" stroke-width="1"/>

    <!-- Chat 4 -->
    <rect x="0" y="304" width="270" height="68" fill="none"/>
    <circle cx="34" cy="338" r="20" fill="#E65100"/>
    <text x="34" y="344" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13">B</text>
    <text x="62" y="328" fill="white" font-family="Arial, sans-serif" font-size="13">Boutique Elegance CI</text>
    <text x="62" y="346" fill="#8696A0" font-family="Arial, sans-serif" font-size="11">Combien coûte un site web ?</text>
    <text x="256" y="324" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">Lun</text>

    <!-- Divider -->
    <line x1="60" y1="372" x2="270" y2="372" stroke="#2A3942" stroke-width="1"/>

    <!-- Chat 5 -->
    <rect x="0" y="372" width="270" height="68" fill="none"/>
    <circle cx="34" cy="406" r="20" fill="#37474F"/>
    <text x="34" y="412" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13">D</text>
    <text x="62" y="396" fill="white" font-family="Arial, sans-serif" font-size="13">Diallo Immobilier</text>
    <text x="62" y="414" fill="#8696A0" font-family="Arial, sans-serif" font-size="11">Votre bot est incroyable 🚀</text>
    <text x="256" y="392" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">Dim</text>
  </g>

  <!-- Vertical separator -->
  <line x1="270" y1="0" x2="270" y2="500" stroke="#202C33" stroke-width="1"/>

  <!-- ── MAIN CHAT AREA ── -->
  <g clip-path="url(#main-clip)">
    <!-- Chat header -->
    <rect x="270" y="0" width="530" height="58" fill="#202C33"/>
    <circle cx="306" cy="29" r="20" fill="#1565C0"/>
    <text x="306" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="bold">R</text>
    <text x="334" y="22" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Restaurant Maquis du Quartier</text>
    <circle cx="336" cy="36" r="4" fill="#00A884"/>
    <text x="347" y="40" fill="#00A884" font-family="Arial, sans-serif" font-size="12">En ligne</text>
    <!-- Header icons -->
    <circle cx="750" cy="29" r="12" fill="none" stroke="#8696A0" stroke-width="1.5"/>
    <line x1="746" y1="25" x2="754" y2="33" stroke="#8696A0" stroke-width="1.5"/>
    <line x1="754" y1="25" x2="746" y2="33" stroke="#8696A0" stroke-width="1.5"/>

    <!-- Chat background -->
    <rect x="270" y="58" width="530" height="388" fill="#0B141A"/>

    <!-- Date pill -->
    <rect x="360" y="70" width="80" height="20" rx="10" fill="#182229"/>
    <text x="400" y="84" text-anchor="middle" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">Aujourd'hui</text>

    <!-- MSG 1: User → (right aligned) -->
    <rect x="536" y="102" width="240" height="54" rx="7" fill="#005C4B" filter="url(#shadow)"/>
    <polygon points="776,102 785,102 776,112" fill="#005C4B"/>
    <text x="550" y="120" fill="white" font-family="Arial, sans-serif" font-size="12">Bonjour, je voudrais créer</text>
    <text x="550" y="137" fill="white" font-family="Arial, sans-serif" font-size="12">un site web pour mon resto 🙂</text>
    <text x="770" y="150" text-anchor="end" fill="rgba(255,255,255,0.55)" font-family="Arial, sans-serif" font-size="10">14:23 ✓✓</text>

    <!-- MSG 2: Bot ← (left aligned) -->
    <rect x="282" y="170" width="300" height="96" rx="7" fill="#202C33" filter="url(#shadow)"/>
    <polygon points="282,170 274,170 282,180" fill="#202C33"/>
    <!-- IA badge -->
    <rect x="290" y="178" width="42" height="14" rx="7" fill="#00A884"/>
    <text x="311" y="189" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">IA BOT</text>
    <text x="290" y="208" fill="white" font-family="Arial, sans-serif" font-size="12">👋 Bonjour ! Je suis l'assistant</text>
    <text x="290" y="226" fill="white" font-family="Arial, sans-serif" font-size="12">virtuel NONALIX. Pour mieux</text>
    <text x="290" y="244" fill="white" font-family="Arial, sans-serif" font-size="12">vous aider, quel est votre secteur ?</text>
    <text x="572" y="260" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">14:23</text>

    <!-- MSG 3: User → -->
    <rect x="556" y="276" width="218" height="36" rx="7" fill="#005C4B" filter="url(#shadow)"/>
    <polygon points="774,276 783,276 774,286" fill="#005C4B"/>
    <text x="570" y="299" fill="white" font-family="Arial, sans-serif" font-size="12">La restauration 🍽️</text>
    <text x="768" y="305" text-anchor="end" fill="rgba(255,255,255,0.55)" font-family="Arial, sans-serif" font-size="10">14:24 ✓✓</text>

    <!-- MSG 4: Bot ← with bullets -->
    <rect x="282" y="326" width="320" height="110" rx="7" fill="#202C33" filter="url(#shadow)"/>
    <polygon points="282,326 274,326 282,336" fill="#202C33"/>
    <rect x="290" y="334" width="42" height="14" rx="7" fill="#00A884"/>
    <text x="311" y="345" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">IA BOT</text>
    <text x="290" y="364" fill="white" font-family="Arial, sans-serif" font-size="12">Parfait ! Je vous recommande :</text>
    <text x="290" y="384" fill="#00A884" font-family="Arial, sans-serif" font-size="12">✓  Site vitrine + menu en ligne</text>
    <text x="290" y="402" fill="#00A884" font-family="Arial, sans-serif" font-size="12">✓  Système de réservation</text>
    <text x="290" y="420" fill="#00A884" font-family="Arial, sans-serif" font-size="12">✓  Bot pour prises de commandes</text>
    <text x="592" y="430" text-anchor="end" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">14:24</text>

    <!-- Quick replies -->
    <rect x="282" y="448" width="110" height="22" rx="11" fill="#182229" stroke="#00A884" stroke-width="1"/>
    <text x="337" y="463" text-anchor="middle" fill="#00A884" font-family="Arial, sans-serif" font-size="10">Voir les tarifs →</text>
    <rect x="402" y="448" width="118" height="22" rx="11" fill="#182229" stroke="#00A884" stroke-width="1"/>
    <text x="461" y="463" text-anchor="middle" fill="#00A884" font-family="Arial, sans-serif" font-size="10">Parler à un expert →</text>

    <!-- Input bar -->
    <rect x="270" y="478" width="530" height="22" fill="#202C33"/>
    <rect x="278" y="482" width="450" height="14" rx="7" fill="#2A3942"/>
    <text x="292" y="493" fill="#8696A0" font-family="Arial, sans-serif" font-size="10">Tapez un message...</text>
    <!-- Send button -->
    <circle cx="770" cy="489" r="10" fill="#00A884"/>
    <polygon points="766,489 774,485 774,493" fill="white"/>
  </g>

  <!-- Branding badge -->
  <rect x="595" y="470" width="130" height="22" rx="4" fill="rgba(0,168,132,0.15)" stroke="rgba(0,168,132,0.3)" stroke-width="1"/>
  <text x="660" y="485" text-anchor="middle" fill="#00A884" font-family="Arial, sans-serif" font-size="10" font-weight="bold">NONALIX — Chatbot IA 24/7</text>
</svg>
