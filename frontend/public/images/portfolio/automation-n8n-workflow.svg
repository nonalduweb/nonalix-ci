<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="node-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3D4454"/>
    </marker>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6D5A"/>
      <stop offset="100%" stop-color="#E85D45"/>
    </linearGradient>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4C6EF5"/>
      <stop offset="100%" stop-color="#3B5BDB"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40C057"/>
      <stop offset="100%" stop-color="#2F9E44"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7950F2"/>
      <stop offset="100%" stop-color="#6741D9"/>
    </linearGradient>
    <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#20C997"/>
      <stop offset="100%" stop-color="#0CA678"/>
    </linearGradient>
  </defs>

  <!-- Canvas background -->
  <rect width="800" height="500" fill="#1A1C24"/>

  <!-- Grid dots pattern -->
  <pattern id="grid-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#2D2E3A"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid-dots)"/>

  <!-- Top status bar -->
  <rect x="0" y="0" width="800" height="42" fill="#13141B"/>
  <!-- n8n logo area -->
  <rect x="12" y="10" width="52" height="22" rx="4" fill="#FF6D5A"/>
  <text x="38" y="25" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">n8n</text>
  <!-- Workflow name -->
  <text x="80" y="26" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="13">Workflow :</text>
  <text x="152" y="26" fill="white" font-family="Arial, sans-serif" font-size="13" font-weight="500">Tunnel de Vente NONALIX — Lead Automatisé</text>
  <!-- Status badge -->
  <rect x="570" y="10" width="82" height="22" rx="11" fill="rgba(64,192,87,0.15)" stroke="rgba(64,192,87,0.4)" stroke-width="1"/>
  <circle cx="583" cy="21" r="4" fill="#40C057"/>
  <text x="626" y="25" text-anchor="middle" fill="#40C057" font-family="Arial, sans-serif" font-size="11" font-weight="600">Actif 24/7</text>
  <!-- Exec count -->
  <text x="665" y="20" fill="#6B7280" font-family="Arial, sans-serif" font-size="11">Exécutions:</text>
  <text x="737" y="20" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="600">2 847</text>

  <!-- ── WORKFLOW NODES ── -->
  <!-- Horizontal flow: 5 nodes at y=230 (center), spaced at x=80,200,330,460,590,720 -->

  <!-- Bezier connections between nodes (drawn first, behind nodes) -->
  <!-- Node1 → Node2 -->
  <path d="M150,230 C175,230 185,230 210,230" stroke="#3D4454" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Node2 → Node3 -->
  <path d="M290,230 C315,230 325,230 350,230" stroke="#3D4454" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Node3 → Node4 -->
  <path d="M430,230 C455,230 465,230 490,230" stroke="#3D4454" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Node4 → Node5a (WhatsApp) - branch up -->
  <path d="M570,220 C595,220 605,180 630,180" stroke="#3D4454" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <!-- Node4 → Node5b (Email) - branch down -->
  <path d="M570,240 C595,240 605,280 630,280" stroke="#3D4454" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Execution progress line (animated look) -->
  <path d="M150,230 C175,230 185,230 430,230" stroke="#FF6D5A" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- ── NODE 1: Webhook (Trigger) ── -->
  <g filter="url(#node-shadow)">
    <rect x="60" y="198" width="90" height="64" rx="8" fill="url(#grad-orange)"/>
  </g>
  <!-- Hexagon trigger icon -->
  <polygon points="90,214 100,208 110,214 110,226 100,232 90,226" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
  <text x="105" y="224" text-anchor="middle" fill="white" font-family="monospace" font-size="10">⚡</text>
  <text x="105" y="248" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">Webhook</text>
  <text x="105" y="258" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif" font-size="9">Formulaire web</text>
  <!-- Pulse indicator -->
  <circle cx="146" cy="202" r="5" fill="#40C057" stroke="#1A1C24" stroke-width="2"/>

  <!-- Node label below -->
  <text x="105" y="278" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">DÉCLENCHEUR</text>

  <!-- ── NODE 2: IA Filter ── -->
  <g filter="url(#node-shadow)">
    <rect x="200" y="198" width="90" height="64" rx="8" fill="url(#grad-blue)"/>
  </g>
  <text x="245" y="220" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">🤖</text>
  <text x="245" y="242" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">Analyse IA</text>
  <text x="245" y="254" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif" font-size="9">Qualification lead</text>
  <circle cx="286" cy="202" r="5" fill="#40C057" stroke="#1A1C24" stroke-width="2"/>

  <text x="245" y="278" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">TRAITEMENT</text>

  <!-- ── NODE 3: CRM HubSpot ── -->
  <g filter="url(#node-shadow)">
    <rect x="340" y="198" width="90" height="64" rx="8" fill="#FF7A59"/>
  </g>
  <!-- HubSpot sprocket icon (simplified) -->
  <circle cx="385" cy="220" r="10" fill="rgba(255,255,255,0.15)"/>
  <circle cx="385" cy="220" r="5" fill="white"/>
  <text x="385" y="242" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">HubSpot CRM</text>
  <text x="385" y="254" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif" font-size="9">Enregistrer contact</text>
  <circle cx="426" cy="202" r="5" fill="#40C057" stroke="#1A1C24" stroke-width="2"/>

  <text x="385" y="278" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">CRM</text>

  <!-- ── NODE 4: Router (branch) ── -->
  <g filter="url(#node-shadow)">
    <rect x="480" y="206" width="90" height="48" rx="8" fill="#374151"/>
    <rect x="480" y="206" width="90" height="48" rx="8" fill="none" stroke="#4B5563" stroke-width="1.5"/>
  </g>
  <text x="525" y="226" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14">⑂</text>
  <text x="525" y="243" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">Router</text>
  <text x="525" y="267" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">BRANCHEMENT</text>

  <!-- ── NODE 5a: WhatsApp (top branch) ── -->
  <g filter="url(#node-shadow)">
    <rect x="622" y="153" width="90" height="54" rx="8" fill="url(#grad-green)"/>
  </g>
  <text x="667" y="174" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">💬</text>
  <text x="667" y="192" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">WhatsApp</text>
  <text x="667" y="202" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="9">Message auto</text>
  <circle cx="708" cy="157" r="5" fill="#40C057" stroke="#1A1C24" stroke-width="2"/>

  <!-- ── NODE 5b: Email (bottom branch) ── -->
  <g filter="url(#node-shadow)">
    <rect x="622" y="253" width="90" height="54" rx="8" fill="url(#grad-purple)"/>
  </g>
  <text x="667" y="274" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">✉️</text>
  <text x="667" y="292" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600">Email Pro</text>
  <text x="667" y="302" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Arial, sans-serif" font-size="9">Relance auto</text>
  <circle cx="708" cy="257" r="5" fill="#40C057" stroke="#1A1C24" stroke-width="2"/>

  <!-- ── STATS PANEL (bottom) ── -->
  <rect x="30" y="330" width="740" height="140" rx="10" fill="#13141B" stroke="#2D2E3A" stroke-width="1"/>

  <!-- Stats title -->
  <text x="50" y="358" fill="#9CA3AF" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PERFORMANCES — 30 DERNIERS JOURS</text>

  <!-- Stat 1: Leads -->
  <rect x="50" y="368" width="140" height="82" rx="8" fill="#1F2028"/>
  <text x="70" y="392" fill="#6B7280" font-family="Arial, sans-serif" font-size="11">Leads capturés</text>
  <text x="70" y="422" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold">127</text>
  <rect x="70" y="430" width="60" height="4" rx="2" fill="#FF6D5A"/>
  <text x="70" y="443" fill="#FF6D5A" font-family="Arial, sans-serif" font-size="10">↑ +34% vs mois dernier</text>

  <!-- Stat 2: Time saved -->
  <rect x="210" y="368" width="140" height="82" rx="8" fill="#1F2028"/>
  <text x="230" y="392" fill="#6B7280" font-family="Arial, sans-serif" font-size="11">Temps économisé</text>
  <text x="230" y="422" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold">80%</text>
  <rect x="230" y="430" width="60" height="4" rx="2" fill="#4C6EF5"/>
  <text x="230" y="443" fill="#4C6EF5" font-family="Arial, sans-serif" font-size="10">vs traitement manuel</text>

  <!-- Stat 3: Response time -->
  <rect x="370" y="368" width="140" height="82" rx="8" fill="#1F2028"/>
  <text x="390" y="392" fill="#6B7280" font-family="Arial, sans-serif" font-size="11">Temps de réponse</text>
  <text x="390" y="422" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold">&lt;2s</text>
  <rect x="390" y="430" width="60" height="4" rx="2" fill="#20C997"/>
  <text x="390" y="443" fill="#20C997" font-family="Arial, sans-serif" font-size="10">Réponse quasi-instantanée</text>

  <!-- Stat 4: Availability -->
  <rect x="530" y="368" width="140" height="82" rx="8" fill="#1F2028"/>
  <text x="550" y="392" fill="#6B7280" font-family="Arial, sans-serif" font-size="11">Disponibilité</text>
  <text x="550" y="422" fill="white" font-family="Arial, sans-serif" font-size="30" font-weight="bold">24/7</text>
  <rect x="550" y="430" width="60" height="4" rx="2" fill="#40C057"/>
  <text x="550" y="443" fill="#40C057" font-family="Arial, sans-serif" font-size="10">Sans intervention humaine</text>

  <!-- Last exec badge -->
  <rect x="692" y="368" width="70" height="32" rx="8" fill="rgba(64,192,87,0.1)" stroke="rgba(64,192,87,0.3)" stroke-width="1"/>
  <text x="727" y="380" text-anchor="middle" fill="#40C057" font-family="Arial, sans-serif" font-size="9">Dernière exec.</text>
  <text x="727" y="393" text-anchor="middle" fill="#40C057" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Il y a 3 min</text>
  <rect x="692" y="408" width="70" height="42" rx="8" fill="#1F2028"/>
  <text x="727" y="424" text-anchor="middle" fill="#6B7280" font-family="Arial, sans-serif" font-size="9">Taux de succès</text>
  <text x="727" y="442" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">99.2%</text>
</svg>
