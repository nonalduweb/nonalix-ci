  <text x="36" y="320" fill="white" font-family="Arial" font-size="11">Importation Chine-Afrique (Alibaba)</text>
  <text x="36" y="333" fill="#9CA3AF" font-family="Arial" font-size="9">Négociation, dédouanement, logistique</text>
  <rect x="306" y="288" width="270" height="52" rx="4" fill="#1A1D2E"/>
  <text x="318" y="305" fill="#C084FC" font-family="Arial" font-size="9" font-weight="600">FORMATION 4 — BONUS</text>
  <text x="318" y="320" fill="white" font-family="Arial" font-size="11">Print on Demand (POD) complet</text>
  <text x="318" y="333" fill="#9CA3AF" font-family="Arial" font-size="9">Créer produits personnalisés sans stock</text>
